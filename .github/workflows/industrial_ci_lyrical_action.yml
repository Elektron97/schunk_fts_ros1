name: Lyrical

on:
  push:
  pull_request:
  schedule:
    # Run every Friday at 6:30 am to detect breaking APIs
    - cron: '30 6 * * 5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  industrial_ci:
    env:
      BEFORE_BUILD_TARGET_WORKSPACE: '.github/script/install_dependencies.sh'
      NOT_TEST_BUILD: 'true'
      AFTER_SCRIPT: 'bash "$TARGET_REPO_PATH/.github/script/run_pytest_lyrical.sh"'

    strategy:
      fail-fast: false
      matrix:
        env:
          - {ROS_DISTRO: lyrical, ROS_REPO: main}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: 'ros-industrial/industrial_ci@master'
        env: ${{matrix.env}}
